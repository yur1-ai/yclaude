name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install web dependencies
        run: cd web && npm ci

      - name: Lint (Biome)
        run: npx @biomejs/biome ci .

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build (production)
        run: npm run build:prod

      - name: Validate package contents
        run: |
          npm pack --dry-run 2>&1 | tee pack-output.txt
          grep -q "dist/server/cli.js" pack-output.txt || (echo "ERROR: dist/server/cli.js missing from package" && exit 1)
          grep -q "dist/web/index.html" pack-output.txt || (echo "ERROR: dist/web/index.html missing from package" && exit 1)
          echo "Package validation passed"

  publish:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install web dependencies
        run: cd web && npm ci

      - name: Build (production)
        run: npm run build:prod

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
